# This workflow generates the docs on each push, and publishes them on GitHub Pages
# (via the native Pages-from-Actions flow) if the branch is "main".

name: docs

on: [push]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Silence tqdm progress bars from gismap (they render as thousands of
# carriage-return lines in GitHub Actions logs).
env:
  TQDM_DISABLE: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Pandoc
        uses: pandoc/actions/setup@v1
        with:
          version: '3.6.3'

      - name: Build Sphinx documentation
        run: |
          uv sync --all-extras
          uv run python build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
